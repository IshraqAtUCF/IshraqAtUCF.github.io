<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel | Ishraq Tashdid</title>
  <meta name="description" content="Photographs from national parks, state travels, and conference trips by Ishraq Tashdid." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Ishraq Tashdid</a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="cv.html">CV</a>
        <a href="projects.html">Projects</a>
        <a href="https://www.linkedin.com/in/ishraqtashdid" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://github.com/IshraqAtUCF" target="_blank" rel="noopener noreferrer">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <p class="eyebrow">Beyond the Lab</p>
        <h1>Travel</h1>
        <p class="hero-sub">
          National parks, state wanders, and conference cities — photographs of the world around.
        </p>
      </div>
    </section>

    <section class="section section-tight">
      <div class="container">
        <!-- Filter bar — rendered by travel.js -->
        <div id="travel-filters" class="proj-filter-bar" role="group" aria-label="Filter by category"></div>

        <!-- Photo grid — rendered by travel.js -->
        <div id="travel-grid" class="travel-grid" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <!-- Lightbox — static shell, controlled by travel.js -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="" />
    <p id="lightbox-caption" class="lightbox-caption"></p>
  </div>

  <footer class="site-footer">

      <p>© <span id="year"></span> Ishraq Tashdid</p>
      <p class="footer-links">
        <a href="cv.html">CV</a>

        <a href="travel.html">Travel</a>
      </p>
    </div>
    <div class="container footer-advisor">
      UCF Cyber Security &amp; Privacy Cluster
    </div>

  <script src="travel.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
